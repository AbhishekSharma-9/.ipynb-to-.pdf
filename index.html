<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jupyter to PDF (By: Abhishek Sharma)</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' },
            startup: {
                ready: () => {
                    MathJax.startup.defaultReady();
                    window.mathJaxReady = true;
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-content">
                <div class="controls" data-html2canvas-ignore="true">
                    <div class="icon-container">
                        <img src="favicon.png" alt="Logo" class="main-logo">
                    </div>
                    <h2>Jupyter to PDF (Smart)</h2>
                    <p class="subtitle">Perfect alignment. No split cells. No footer overlap.</p>
                    
                    <div class="upload-box">
                        <input type="file" id="fileInput" accept=".ipynb" />
                    </div>
                    
                    <button id="convertBtn" class="btn" disabled>Generate PDF</button>
                    
                    <div class="status-container">
                        <p id="status">Waiting for file...</p>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="theme-switch-wrapper">
                    <span class="theme-switch-label">☀️</span>
                    <label class="theme-switch">
                        <input type="checkbox" onclick="document.body.classList.toggle('dark-theme')">
                        <span class="slider"></span>
                    </label>
                    <span class="theme-switch-label">🌙</span>
                </div>
                <div class="credits">
                    <p>Made by</p>
                    <a href="https://github.com/AbhishekSharma-9" target="_blank">Abhishek Sharma<br>(Karlo Sharma)</a>
                </div>
            </div>
        </div>

        <div class="preview-area">
            <div id="notebook-preview"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
